services:

  db:
    image: mysql:latest
    container_name: mysql-events
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: events_booking_app
    ports:
      - "3306:3306"
    volumes:
      - database:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  database:
