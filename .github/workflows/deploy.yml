name: MyEventsBookingApp

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PW }}
          MYSQL_DATABASE: events_booking_app
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -p${MYSQL_ROOT_PASSWORD}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v5

      - name: Initialise database
        env: 
          MYSQL_PW: ${{ secrets.MYSQL_PW }}
        run: |
          docker exec -i $(docker ps -qf "ancestor=mysql:9.0") \
          mysql -uroot -p${MYSQL_PW} events_booking_app < init.sql

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MYSQL_PW: ${{ secrets.MYSQL_PW }}
        run: uv run pytest
